global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pra-exchange'

# فایل هشدارها
rule_files:
  - "alerts.yml"

# تنظیمات scrape
scrape_configs:
  - job_name: 'pra-backend'
    static_configs:
      - targets: ['pra-backend:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
