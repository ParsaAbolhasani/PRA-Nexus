groups:
  - name: pra_exchange_alerts
    interval: 30s
    rules:
      # API Down Alert
      - alert: API服务停止
        expr: up{job="pra-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PRA Exchange API is down"
          description: "API has been unreachable for more than 1 minute"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for 5 minutes"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85%"

      # Disk Space
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10%"

      # Database Down
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "Database server is not responding"

      # Redis Down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis server is not responding"

      # Slow Transaction Rate
      - alert: SlowTransactions
        expr: rate(pra_transaction_duration_seconds_count[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High transaction rate"
          description: "Transaction rate is unusually high"

      # High Trade Failure Rate
      - alert: HighTradeFailureRate
        expr: (rate(pra_trade_failures_total[5m]) / rate(pra_trade_attempts_total[5m])) * 100 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High trade failure rate"
          description: "More than 10% of trades are failing"

      # Blockchain Connection Lost
      - alert: BlockchainDisconnected
        expr: pra_blockchain_connected == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Blockchain connection lost"
          description: "WebSocket connection to blockchain node is down"

      # Mempool Size Growing
      - alert: MempoolSizeGrowing
        expr: pra_mempool_size > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mempool is growing"
          description: "Mempool has more than 1000 pending transactions"