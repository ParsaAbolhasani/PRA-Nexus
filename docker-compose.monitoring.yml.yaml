version: '3.8'

services:
  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: pra_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - pra_network
    restart: unless-stopped

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:latest
    container_name: pra_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ==================== Node Exporter (System Metrics) ====================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: pra_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"
    networks:
      - pra_network
    restart: unless-stopped

  # ==================== PostgreSQL Exporter ====================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pra_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pra_user:pra_password@postgres:5432/pra_exchange?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      - postgres

  # ==================== Redis Exporter ====================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pra_redis_exporter
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      - redis

  # ==================== Blackbox Exporter (Endpoint Monitoring) ====================
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: pra_blackbox_exporter
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"
    networks:
      - pra_network
    restart: unless-stopped

  # ==================== Alertmanager ====================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: pra_alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - pra_network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  pra_network:
    external: true