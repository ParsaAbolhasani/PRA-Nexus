version: '3.8'

services:
  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: pra_elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=pra-cluster
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.monitoring.collection.enabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elk_es_data:/usr/share/elasticsearch/data
      - ./monitoring/elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - pra_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Logstash ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.1
    container_name: pra_logstash
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ELASTIC_HOSTS=http://elasticsearch:9200
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./monitoring/elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./monitoring/elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"   # Monitoring API
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    container_name: pra_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - SERVER_NAME=kibana
    volumes:
      - ./monitoring/elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ==================== Filebeat (ارسال لاگ از Docker) ====================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.1
    container_name: pra_filebeat
    user: root
    volumes:
      - ./monitoring/elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: filebeat -e -strict.perms=false
    networks:
      - pra_network
    restart: unless-stopped
    depends_on:
      - logstash

volumes:
  elk_es_data:
    driver: local

networks:
  pra_network:
    external: true
